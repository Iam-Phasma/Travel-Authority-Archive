<header class="sticky-header">
    <div class="sticky-header-content">
        <div class="sticky-header-left">
            <div class="sticky-header-logos" aria-hidden="true">
                <img src="HEADER_ASSETS_PATH/CHED-Logo.webp" alt="CHED Logo" class="sticky-header-logo">
                <img src="HEADER_ASSETS_PATH/Bagong_Pilipinas_logo.webp" alt="Bagong Pilipinas logo" class="sticky-header-logo sticky-header-logo--secondary">
            </div>
            <div class="sticky-header-title-wrapper">
                <h1 class="sticky-header-title">
                    <span class="title-full">CHEDRO IV Travel Authority Archive</span>
                    <span class="title-abbr">CTAA</span>
                </h1>
                <p class="header-date" id="header-date"></p>
            </div>
        </div>
        <div class="sticky-header-actions">
            <button id="user-menu-btn" type="button" class="header-user-btn" title="User Menu">
                <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false" class="user-icon">
                    <path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Zm0 0a8.949 8.949 0 0 0 4.951-1.488A3.987 3.987 0 0 0 13 16h-2a3.987 3.987 0 0 0-3.951 3.512A8.948 8.948 0 0 0 12 21Zm3-11a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
                </svg>
                <span id="header-user-name" class="header-user-name">Loading...</span>
            </button>
            <div id="header-popup-panel" class="header-popup-panel">
                <div class="header-popup-content">
                    <div class="header-popup-user-info">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="m3.5 5.5 7.893 6.036a1 1 0 0 0 1.214 0L20.5 5.5M4 19h16a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1Z"/>
                        </svg>
                        <span id="header-user-email" class="header-user-email">Loading...</span>
                    </div>
                    <button id="header-settings-option" class="header-popup-option" type="button">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M21 13v-2a1 1 0 0 0-1-1h-.757l-.707-1.707.535-.536a1 1 0 0 0 0-1.414l-1.414-1.414a1 1 0 0 0-1.414 0l-.536.535L14 4.757V4a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v.757l-1.707.707-.536-.535a1 1 0 0 0-1.414 0L4.929 6.343a1 1 0 0 0 0 1.414l.536.536L4.757 10H4a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h.757l.707 1.707-.535.536a1 1 0 0 0 0 1.414l1.414 1.414a1 1 0 0 0 1.414 0l.536-.535 1.707.707V20a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-.757l1.707-.708.536.536a1 1 0 0 0 1.414 0l1.414-1.414a1 1 0 0 0 0-1.414l-.535-.536.707-1.707H20a1 1 0 0 0 1-1Z"/>
                            <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
                        </svg>
                        <span>Settings</span>
                    </button>
                    <button id="header-logout-option" class="header-popup-option" type="button">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M16 12H4m12 0-4 4m4-4-4-4m3-4h2a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3h-2"/>
                        </svg>
                        <span>Log Out</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>

<script>
    // Display current date in header
    (function() {
        const dateElement = document.getElementById('header-date');
        if (dateElement) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date();
            const formattedDate = today.toLocaleDateString('en-US', options);
            dateElement.textContent = `Today is ${formattedDate}`;
        }
    })();
</script>
