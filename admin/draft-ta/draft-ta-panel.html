<section class="panel upload-panel-structured hidden" id="draft-ta-panel">
    <div class="panel-header-structured">
        <h2>Draft Travel Authority</h2>
        <p>Prepare the core travel details and generate a TA PDF.</p>
    </div>

    <div class="fields structured-fields">
        <div class="field-spread">
            <div>
                <label for="panel-draft-ta-purpose">Purpose <span class="required">*</span></label>
                <div class="input-wrap input-wrap--textarea">
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M4 5h16a1 1 0 0 1 1 1v10a3 3 0 0 1-3 3H8a5 5 0 0 1-5-5V6a1 1 0 0 1 1-1Zm1 2v7a3 3 0 0 0 3 3h10a1 1 0 0 0 1-1V7H5Zm3 1h8a1 1 0 1 1 0 2H8a1 1 0 0 1 0-2Zm0 4h6a1 1 0 1 1 0 2H8a1 1 0 0 1 0-2Z" />
                        </svg>
                    </span>
                    <textarea id="panel-draft-ta-purpose" placeholder="Enter travel purpose" maxlength="1000"></textarea>
                </div>
            </div>
            <div>
                <label for="panel-draft-ta-destination">Destination <span class="required">*</span></label>
                <div class="input-wrap input-wrap--textarea">
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M12 2C8.1 2 5 5.1 5 9c0 5.3 7 13 7 13s7-7.7 7-13c0-3.9-3.1-7-7-7Zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5Z" />
                        </svg>
                    </span>
                    <textarea id="panel-draft-ta-destination" placeholder="Enter destination" maxlength="1000"></textarea>
                </div>
                <button type="button" class="map-pick-btn" id="panel-draft-ta-map-pick" title="Pick location on map">
                    <svg viewBox="0 0 24 24"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12 11m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0"/><path d="M17.657 16.657l-4.243 4.243a2 2 0 0 1 -2.827 0l-4.244 -4.243a8 8 0 1 1 11.314 0z"/></svg>
                    Pick on Map
                </button>
                <span class="map-pick-hint">Pinpoint a location to auto-fill destination</span>
            </div>
        </div>

        <div>
            <label for="panel-draft-ta-officials-search">Officials <span class="required">*</span></label>
            <div class="multiselect-wrapper">
                <div class="multiselect-display" id="panel-draft-ta-officials-display">
                    <span class="multiselect-placeholder">Select officials...</span>
                </div>
                <div class="multiselect-dropdown" id="panel-draft-ta-officials-dropdown">
                    <div class="multiselect-search-wrapper">
                        <input type="text" class="multiselect-search" id="panel-draft-ta-officials-search" placeholder="Search Officials...">
                        <button type="button" class="multiselect-settings-btn icon-btn" id="panel-draft-ta-officials-settings-btn" title="Officials settings" aria-label="Officials settings">
                            <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                                <path d="M21 13v-2a1 1 0 0 0-1-1h-.757l-.707-1.707.535-.536a1 1 0 0 0 0-1.414l-1.414-1.414a1 1 0 0 0-1.414 0l-.536.535L14 4.757V4a1 1 0 0 0-1-1h-2a1 1 0 0 0-1 1v.757l-1.707.707-.536-.535a1 1 0 0 0-1.414 0L4.929 6.343a1 1 0 0 0 0 1.414l.536.536L4.757 10H4a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h.757l.707 1.707-.535.536a1 1 0 0 0 0 1.414l1.414 1.414a1 1 0 0 0 1.414 0l.536-.535 1.707.707V20a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-.757l1.707-.708.536.536a1 1 0 0 0 1.414 0l1.414-1.414a1 1 0 0 0 0-1.414l-.535-.536.707-1.707H20a1 1 0 0 0 1-1Z"/>
                                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
                            </svg>
                        </button>
                        <button type="button" class="multiselect-clear-all delete-employee-btn icon-btn" data-clear-all="true" id="panel-draft-ta-officials-clear-all" title="Clear all selected" aria-label="Clear all officials">
                            <svg class="icon-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-hidden="true" focusable="false">
                                <path d="M5 7h14m-9 3v8m4-8v8M10 3h4a1 1 0 0 1 1 1v3H9V4a1 1 0 0 1 1-1ZM6 7h12v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7Z" />
                            </svg>
                        </button>
                    </div>
                    <div class="multiselect-options" id="panel-draft-ta-officials-options"></div>
                </div>
            </div>
        </div>

        <hr class="form-section-sep">

        <div class="field-spread">
            <div>
                <label for="panel-draft-ta-travel-date">Travel Date <span class="required">*</span></label>
                <div class="input-wrap">
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v12a3 3 0 0 0 3 3h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 14H6a1 1 0 0 1-1-1V10h14v8ZM7 12h5v5H7v-5Z" />
                        </svg>
                    </span>
                    <input id="panel-draft-ta-travel-date" type="text" placeholder="Select travel date" readonly>
                </div>
            </div>
            <div>
                <label for="panel-draft-ta-travel-end">Travel End</label>
                <div class="input-wrap">
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v12a3 3 0 0 0 3 3h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 14H6a1 1 0 0 1-1-1V10h14v8ZM7 12h5v5H7v-5Z" />
                        </svg>
                    </span>
                    <input id="panel-draft-ta-travel-end" type="text" placeholder="Select end date" readonly>
                </div>
            </div>
        </div>

        <div class="field-spread">
            <div>
                <label for="panel-draft-ta-travel-type">Travel Type</label>
                <div class="input-wrap">
                    <select id="panel-draft-ta-travel-type">
                        <option value="official_business" selected>Official Business</option>
                        <option value="official_time_only">Official Time Only</option>
                    </select>
                </div>
            </div>
            <div>
                <label for="panel-draft-ta-funding-option">Funding Option</label>
                <div class="input-wrap">
                    <select id="panel-draft-ta-funding-option">
                        <option value="cash_advance">Cash Advance</option>
                        <option value="reimbursement" selected>Reimbursement</option>
                    </select>
                </div>
            </div>
        </div>

        <hr class="form-section-sep">

        <div class="field-spread">
            <div>
                <label for="panel-draft-ta-date-request">Date Requested <span class="required">*</span></label>
                <div class="input-wrap">
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false">
                            <path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 0 0-2 2v12a3 3 0 0 0 3 3h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 14H6a1 1 0 0 1-1-1V10h14v8ZM7 12h5v5H7v-5Z" />
                        </svg>
                    </span>
                    <input id="panel-draft-ta-date-request" type="text" placeholder="Select date requested" readonly>
                </div>
            </div>
            <div>
                <label for="panel-draft-ta-iso-control">ISO Control No.</label>
                <div class="input-wrap">
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M9 5l-.5 3H5v2h3.17l-.5 3H4v2h3.33l-.5 3h2l.5-3h3l-.5 3h2l.5-3H18v-2h-3.17l.5-3H19V8h-3.33l.5-3h-2l-.5 3h-3l.5-3H9zm2.17 5h3l-.5 3h-3l.5-3z"/></svg>
                    </span>
                    <input id="panel-draft-ta-iso-control" type="text" value="AD-HRS-F010-00" maxlength="30" placeholder="AD-HRS-F010-00">
                </div>
            </div>
        </div>

        <div class="upload-actions">
            <button id="panel-draft-ta-clear" class="modal-btn cancel" type="button">Clear Fields</button>
            <button id="panel-draft-ta-create" class="modal-btn confirm" type="button" style="background: #081430;">Create TA</button>
        </div>
    </div>
</section>
