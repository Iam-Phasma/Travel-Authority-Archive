    <script>
        // Configure pdf.js worker after library loads
        if (window.pdfjsLib) {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

    </script>

<body class="dashboard-page">
    <div id="header-container"></div>
    <script>
        // Load header HTML
        window.headerLoaded = false;
        fetch('../header/header.html?v=20260326-2')
            .then(response => response.text())
            .then(data => {
                const headerHTML = data.replace(/HEADER_ASSETS_PATH/g, '../assets');
                document.getElementById('header-container').innerHTML = headerHTML;
                window.headerLoaded = true;
                
                // Initialize date display in header
                const dateElement = document.getElementById('header-date');
                if (dateElement) {
                    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                    const today = new Date();
                    const formattedDate = today.toLocaleDateString('en-US', options);
                    dateElement.textContent = `Today is ${formattedDate}`;
                }
                
                // Call initHeaderButtons now that header is loaded
                // Module may not have executed yet, so retry with a delay
                if (window.initHeaderButtons) {
                    window.initHeaderButtons();
                } else {
                    // Module hasn't loaded yet; it will call initHeaderButtons itself
                    // But also retry in case of timing edge case
                    const retryInterval = setInterval(() => {
                        if (window.initHeaderButtons) {
                            window.initHeaderButtons();
                            clearInterval(retryInterval);
                        }
                    }, 100);
                    // Stop retrying after 5 seconds
                    setTimeout(() => clearInterval(retryInterval), 5000);
                }
            })
            .catch(error => console.error('Error loading header:', error));
    </script>

    <script>
        fetch('../footer/footer.html?v=20260321-1')
            .then(response => response.text())
