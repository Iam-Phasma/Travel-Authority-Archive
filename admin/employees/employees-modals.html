<div id="delete-employee-modal" class="modal">
    <div class="modal-content">
        <h3>Confirm Official Deletion</h3>
        <p>Are you sure you want to delete this official from the list?</p>
        <p id="delete-employee-records-note" class="modal-records-note hidden"></p>
        <div class="modal-actions">
            <button class="modal-btn cancel" id="cancel-delete-employee">Cancel</button>
            <button class="modal-btn confirm" id="confirm-delete-employee">Delete</button>
        </div>
    </div>
</div>

<div id="edit-employee-modal" class="modal">
    <div class="modal-content modal-form">
        <h3>Update Official Details</h3>
        <div class="fields">
            <div>
                <label for="edit-employee-name">Official Name <span class="required">*</span></label>
                <input id="edit-employee-name" type="text" placeholder="Enter official name" maxlength="30" pattern="[a-zA-ZÀ-ÿ\s\-'.,]+" title="Only letters, spaces, hyphens, apostrophes, periods, and commas allowed" required>
            </div>
            <div>
                <label for="edit-employee-position">Position</label>
                <input id="edit-employee-position" type="text" placeholder="Enter position" autocomplete="off" list="employee-position-suggestions">
            </div>
            <div>
                <label for="edit-employee-office">Office</label>
                <input id="edit-employee-office" type="text" placeholder="Enter office (optional)" autocomplete="off" list="employee-office-suggestions">
            </div>
        </div>
        <p class="modal-records-note hidden" id="edit-employee-records-note"></p>
        <span class="status hidden" id="edit-employee-status"></span>
        <div class="modal-actions">
            <button class="modal-btn cancel" id="cancel-edit-employee">Cancel</button>
            <button class="modal-btn confirm" id="confirm-edit-employee">Update</button>
        </div>
    </div>
</div>
