<section class="panel wide-panel users-panel hidden" id="users-panel">
    <div class="panel-head">
        <div style="display:flex;flex-direction:column;gap:1px;">
            <h2 style="font-size:1.5rem;margin:0;line-height:1.2;">Manage Users</h2>
            <span class="status" style="font-size:0.8rem;">Manage user accounts and roles. Only super users can modify user roles.</span>
            <span class="status" id="users-status" style="font-size:0.8rem;">Manage user roles and permissions.</span>
        </div>
        <div class="panel-head-actions">
            <button id="users-filter-toggle-btn" class="filter-icon-btn" type="button" aria-label="Toggle filters" title="Filter">
                <svg class="icon-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" role="img" aria-hidden="true" focusable="false">
                    <path d="M18.796 4H5.204a1 1 0 0 0-.753 1.659l5.302 6.058a1 1 0 0 1 .247.659v4.874a.5.5 0 0 0 .2.4l3 2.25a.5.5 0 0 0 .8-.4v-7.124a1 1 0 0 1 .247-.659l5.302-6.059c.566-.646.106-1.658-.753-1.658Z"/>
                </svg>
                <span class="btn-label">Filter</span>
            </button>
        </div>
    </div>
    <div id="users-filter-panel" class="filter-panel">
        <div class="filter-content">
            <h3>Filter Options</h3>
            <div class="filter-fields">
                <div class="filter-field">
                    <label for="users-role-filter">Role</label>
                    <select id="users-role-filter" class="filter-select">
                        <option value="">All Roles</option>
                        <option value="super">Super</option>
                        <option value="admin">Admin</option>
                        <option value="user">User</option>
                    </select>
                </div>
                <div class="filter-field">
                    <label for="users-access-filter">Access</label>
                    <select id="users-access-filter" class="filter-select">
                        <option value="">All Access</option>
                        <option value="enabled">Enabled</option>
                        <option value="disabled">Disabled</option>
                    </select>
                </div>
                <div class="filter-field">
                    <label for="users-status-filter">Status</label>
                    <select id="users-status-filter" class="filter-select">
                        <option value="">All Status</option>
                        <option value="online">Online</option>
                        <option value="offline">Offline</option>
                        <option value="blocked">Blocked</option>
                    </select>
                </div>
            </div>
            <div class="filter-actions">
                <button id="users-clear-filter-btn" class="filter-btn clear-btn" type="button">Reset</button>
                <button id="users-apply-filter-btn" class="filter-btn apply-btn" type="button">Apply Filter</button>
            </div>
        </div>
    </div>
    
    <div class="table-wrap users-table-wrap">
        <table class="data-table users-table">
            <thead>
                <tr>
                    <th scope="col" class="text-left">Name</th>
                    <th scope="col" class="text-left">Email</th>
                    <th scope="col">Status</th>
                    <th scope="col">Access</th>
                    <th scope="col">Change Role</th>
                    <th scope="col">
                        <span class="th-control-wrap">
                            Control
                            <span class="ctrl-tooltip">
                                <svg class="ctrl-tooltip-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M11 17h2v-6h-2v6zm1-15C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-11h2V7h-2v2z"/></svg>
                                <span class="ctrl-tooltip-box" role="tooltip">
                                    <span class="ctrl-tip-scope">Files &amp; Officials</span>
                                    <span class="ctrl-tip-row"><span class="ctrl-tip-badge lvl1">Lvl 1</span>Edit only</span>
                                    <span class="ctrl-tip-row"><span class="ctrl-tip-badge lvl2">Lvl 2</span>Edit + Delete</span>
                                </span>
                            </span>
                        </span>
                    </th>
                </tr>
            </thead>
            <tbody id="users-body">
                <tr>
                    <td colspan="6">Loading users...</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>

<div id="edit-user-name-modal" class="modal">
    <div class="modal-content modal-form">
        <h3>Edit User Name</h3>
        <div class="fields">
            <div>
                <label for="edit-user-fname">First Name</label>
                <input id="edit-user-fname" type="text" maxlength="60" placeholder="Enter first name" autocomplete="off">
            </div>
            <div>
                <label for="edit-user-lname">Last Name</label>
                <input id="edit-user-lname" type="text" maxlength="60" placeholder="Enter last name" autocomplete="off">
            </div>
        </div>
        <p id="edit-user-name-status" class="status hidden"></p>
        <div class="modal-actions">
            <button class="modal-btn cancel" id="cancel-edit-user-name" type="button">Cancel</button>
            <button class="modal-btn confirm" id="confirm-edit-user-name" type="button">Save</button>
        </div>
    </div>
</div>
