<section class="panel wide-panel hidden" id="view-panel">
    <div class="panel-head">
        <div style="display:flex;flex-direction:column;gap:1px;">
            <h2 style="font-size:1.5rem;margin:0;line-height:1.2;">Records</h2>
            <span id="admin-last-updated" class="status" style="font-size:0.8rem;"></span>
            <span class="status" id="view-status" style="font-size:0.8rem;">Fetching travel authorities.</span>
        </div>
        <div class="panel-head-actions">
            <div class="ta-search-wrap">
                <svg class="ta-search-icon" viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="admin-ta-number-search" class="ta-search-input" placeholder="Search TA number" maxlength="12" autocomplete="off" aria-label="Search by TA Number">
            </div>
            <div class="panel-head-actions-buttons">
            <button id="admin-refresh-btn" class="filter-icon-btn" type="button" aria-label="Refresh table" title="Refresh">
                <svg class="icon-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-hidden="true" focusable="false">
                    <path d="M17.651 7.65a7.131 7.131 0 0 0-12.68 3.15M18.001 4v4h-4m-7.652 8.35a7.13 7.13 0 0 0 12.68-3.15M6 20v-4h4"/>
                </svg>
                <span class="btn-label">Reload</span>
            </button>
            <button id="admin-export-btn" class="filter-icon-btn" type="button" aria-label="Export to Excel" title="Export to Excel">
                <svg class="icon-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-hidden="true" focusable="false">
                    <path d="M4 15v2a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-2m-8 1V4m0 12-4-4m4 4 4-4"/>
                </svg>
                <span class="btn-label">Export</span>
            </button>
            <button id="admin-sort-toggle-btn" class="filter-icon-btn" type="button" aria-label="Toggle sort" title="Sort">
                <svg class="icon-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-hidden="true" focusable="false">
                    <path d="M8 20V10m0 10-3-3m3 3 3-3m5-13v10m0-10 3 3m-3-3-3 3"/>
                </svg>
                <span class="btn-label">Sort</span>
            </button>
            <button id="admin-filter-toggle-btn" class="filter-icon-btn" type="button" aria-label="Toggle filters" title="Filter">
                <svg class="icon-line" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" role="img" aria-hidden="true" focusable="false">
                    <path d="M18.796 4H5.204a1 1 0 0 0-.753 1.659l5.302 6.058a1 1 0 0 1 .247.659v4.874a.5.5 0 0 0 .2.4l3 2.25a.5.5 0 0 0 .8-.4v-7.124a1 1 0 0 1 .247-.659l5.302-6.059c.566-.646.106-1.658-.753-1.658Z"/>
                </svg>
                <span class="btn-label">Filter</span>
            </button>
            </div>
            <!--<span class="pill">Admin Access</span> -->
        </div>
    </div>
    <div id="admin-filter-panel" class="filter-panel">
        <div class="filter-content">
            <h3>Filter Options</h3>
            <div class="filter-mode">
                <label class="checkbox-label">
                    <input type="checkbox" id="admin-filter-match-all" checked>
                    <span>Match all filters (AND)</span>
                </label>
                <p class="filter-mode-note">Unchecked: Match any filter (OR)</p>
            </div>
            <div class="filter-fields">
                <div class="filter-field">
                    <label for="admin-filter-employee">Official</label>
                    <div class="autocomplete-wrapper">
                        <input type="text" id="admin-filter-employee" class="filter-employee-input" placeholder="Search official..." autocomplete="off">
                        <div id="admin-filter-employee-autocomplete" class="autocomplete-dropdown" style="display:none;"></div>
                    </div>
                </div>
                <div class="filter-field">
                    <label for="admin-filter-year">Year</label>
                    <select id="admin-filter-year" class="filter-select">
                        <option value="">All Years</option>
                    </select>
                </div>
                <div class="filter-field">
                    <label for="admin-filter-travel-date">Travel Date</label>
                    <input type="text" id="admin-filter-travel-date" placeholder="Select date">
                </div>
            </div>
            <div class="filter-actions">
                <button id="admin-clear-filter-btn" class="filter-btn clear-btn" type="button">Reset Filter</button>
                <button id="admin-apply-filter-btn" class="filter-btn apply-btn" type="button">Apply Filter</button>
            </div>
        </div>
    </div>
    <div id="admin-sort-panel" class="filter-panel">
        <div class="filter-content">
            <h3>Sort Options</h3>
            <div class="filter-fields">
                <div class="filter-field">
                    <label for="admin-sort-by">Sort by</label>
                    <select id="admin-sort-by" class="filter-select">
                        <option value="ta">TA Number</option>
                        <option value="travel-date">Travel Date</option>
                    </select>
                </div>
                <div class="filter-field">
                    <label for="admin-sort-order">Order</label>
                    <select id="admin-sort-order" class="filter-select">
                        <option value="asc">Oldest First</option>
                        <option value="desc">Newest First</option>
                    </select>
                </div>
            </div>
            <div class="filter-actions">
                <button id="admin-clear-sort-btn" class="filter-btn clear-btn" type="button">Reset Sort</button>
                <button id="admin-apply-sort-btn" class="filter-btn apply-btn" type="button">Apply Sort</button>
            </div>
        </div>
    </div>
    <div id="admin-export-panel" class="filter-panel">
        <div class="filter-content">
            <h3>Export to Excel</h3>
            <p class="filter-note">Select years to include in the export.</p>
            <div class="filter-fields">
                <div class="filter-field">
                    <label class="checkbox-label">
                        <input type="checkbox" id="export-all-years">
                        <span>All Years</span>
                    </label>
                </div>
                <div id="export-years-list" class="export-years-list">
                    <!-- Year checkboxes will be populated dynamically -->
                </div>
            </div>
            <span class="status hidden export-status" id="export-status"></span>
            <div class="filter-actions">
                <button id="cancel-export" class="filter-btn clear-btn" type="button">Cancel</button>
                <button id="confirm-export" class="filter-btn apply-btn" type="button">Export</button>
            </div>
        </div>
    </div>
    <div class="table-wrap max-rows-10">
        <table class="data-table" aria-describedby="view-status">
            <thead>
                <tr>
                    <th scope="col">View</th>
                    <th scope="col">TA Number</th>
                    <th scope="col">Purpose</th>
                    <th scope="col">Destination</th>
                    <th scope="col">Officials</th>
                    <th scope="col">Travel Date</th>
                    <th scope="col">Travel End</th>
                    <th scope="col">File</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody id="view-body">
                <tr>
                    <td colspan="9">Loading records...</td>
                </tr>
            </tbody>
        </table>
        <div id="view-lazy-sentinel" class="lazy-sentinel" style="display:none;">
            <dotlottie-wc src="../../assets/load.lottie" autoplay loop></dotlottie-wc>
        </div>
    </div>
</section>
